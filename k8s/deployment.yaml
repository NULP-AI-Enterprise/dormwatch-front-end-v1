apiVersion: apps/v1
kind: Deployment
metadata:
  name: dormwatch-front-v1
  namespace: dormwatch-front-v1
  labels:
    app: dormwatch-front-v1
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dormwatch-front-v1
  template:
    metadata:
      labels:
        app: dormwatch-front-v1
    spec:
      containers:
        - name: dormwatch-front-v1
          # CI automatically updates this tag after each push to main
          image: ghcr.io/nulp-ai-enterprise/dormwatch-front-end-v1:sha-03b06da
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          env:
            - name: BACKEND_URL
              value: "http://dormwatch-backend-v1.dormwatch-backend-v1.svc.cluster.local:8000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 12
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
