server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check for k8s probes
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy API requests to backend — resolver + variable defers DNS lookup
    # to request time so nginx starts even when backend is not yet available.
    # BACKEND_URL and NAMESERVER are substituted by entrypoint.sh at startup.
    location /api/ {
        resolver ${NAMESERVER} valid=30s ipv6=off;
        set $backend "${BACKEND_URL}";  # override via BACKEND_URL env var
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA routing — fallback to index.html for client-side navigation
    location / {
        try_files $uri $uri/ /index.html;
    }
}
